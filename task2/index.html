<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Vidhi 🎂</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #fbc2eb, #a6c1ee);
    background-size: 400% 400%;
    animation: gradientBG 10s ease infinite;
}

@keyframes gradientBG {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

h1 {
    font-size: 3rem;
    color: white;
    text-shadow: 0 0 15px rgba(0,0,0,0.3);
    margin-bottom: 20px;
}

#typing {
    border-right: 3px solid white;
    white-space: nowrap;
    overflow: hidden;
    width: 0;
    animation: typing 4s steps(30, end) forwards, blink 0.7s infinite;
}

@keyframes typing {
    from { width: 0 }
    to { width: 100% }
}

@keyframes blink {
    50% { border-color: transparent }
}

/* Cake */
.cake {
    position: relative;
    width: 200px;
    height: 120px;
    background: #ff6f91;
    border-radius: 10px;
    box-shadow: 0 5px 0 #c94f6d;
}

.cake::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 20px;
    background: #fff;
    top: -10px;
    border-radius: 10px;
}

.candle {
    position: absolute;
    width: 10px;
    height: 40px;
    background: #fff;
    top: -50px;
    left: 50%;
    transform: translateX(-50%);
}

.flame {
    position: absolute;
    width: 15px;
    height: 20px;
    background: orange;
    border-radius: 50%;
    top: -20px;
    left: -2px;
    animation: flicker 0.2s infinite;
}

@keyframes flicker {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.2); opacity: 0.8; }
    100% { transform: scale(1); opacity: 1; }
}

/* Balloons */
.balloon {
    position: absolute;
    bottom: -150px;
    width: 60px;
    height: 80px;
    border-radius: 50%;
    animation: float 6s linear infinite;
}

@keyframes float {
    from { transform: translateY(0); }
    to { transform: translateY(-120vh); }
}

/* Button */
button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: white;
    cursor: pointer;
    font-weight: bold;
}

/* Confetti */
.confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    background: red;
    top: 0;
    animation: fall 3s linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
    }
}
</style>
</head>

<body>

<h1 id="typing">🎉 Happy Birthday Vidhi 🎂</h1>

<div class="cake">
    <div class="candle">
        <div class="flame"></div>
    </div>
</div>

<button onclick="startParty()">🎵 Play Music & Confetti</button>

<audio id="music" src="https://www.bensound.com/bensound-music/bensound-happyrock.mp3"></audio>

<script>
// Balloons
function createBalloon() {
    const balloon = document.createElement("div");
    balloon.classList.add("balloon");

    balloon.style.left = Math.random() * window.innerWidth + "px";
    balloon.style.background = `hsl(${Math.random()*360}, 70%, 60%)`;
    balloon.style.animationDuration = (4 + Math.random()*3) + "s";

    document.body.appendChild(balloon);

    setTimeout(() => balloon.remove(), 7000);
}
setInterval(createBalloon, 600);

// Confetti
function confettiBurst() {
    for (let i = 0; i < 80; i++) {
        const confetti = document.createElement("div");
        confetti.classList.add("confetti");
        confetti.style.left = Math.random() * window.innerWidth + "px";
        confetti.style.background = `hsl(${Math.random()*360},100%,50%)`;
        confetti.style.animationDuration = (2 + Math.random()*2) + "s";
        document.body.appendChild(confetti);

        setTimeout(() => confetti.remove(), 4000);
    }
}

// Start Party
function startParty() {
    document.getElementById("music").play();
    confettiBurst();
}
</script>

</body>
</html>
